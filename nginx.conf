server {
    listen 80;
    server_name direct-chat.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name direct-chat.ru;

    ssl_certificate     /etc/letsencrypt/live/direct-chat.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/direct-chat.ru/privkey.pem;

    # 1. Статика Flutter
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. WebSocket (Gateway)
    # На фронте подключайся к wss://твой-домен.рф/ws
    location /ws {
        proxy_pass http://gateway-service:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/ {
        proxy_pass http://auth-service:8000/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
