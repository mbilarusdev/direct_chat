version: '3.8'

services:
  # 1. Прокси-сервер (Nginx) — единственная точка входа
  nginx:
    image: nginx:alpine
    container_name: vdesk_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/build/web:/usr/share/nginx/html:ro # Статика Flutter
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro # Конфиг Nginx
      - /etc/letsencrypt:/etc/letsencrypt:ro # Сертификаты Certbot
    depends_on:
      - gateway-service
      - auth-service

  db:
    image: postgres:15-alpine
    container_name: vdesk_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Порт 5432 наружу лучше не открывать для безопасности.
    # Если нужно смотреть через DBeaver, оставь, но на сервере закрой фаерволом.

  migrations:
    image: mfridman/goose:3.15.0
    container_name: vdesk_migrations
    volumes:
      - ./chat/migrations:/migrations
    env_file: .env
    command: postgres "${DATABASE_URL}" up
    depends_on:
      db:
        condition: service_healthy

  auth-service:
    build: ./auth_service
    container_name: vdesk_auth
    restart: always
    env_file: .env
    # ports больше не нужны, Nginx общается с ним внутри сети Docker
    depends_on:
      migrations:
        condition: service_completed_successfully

  chat-service:
    build: ./chat
    container_name: vdesk_chat
    restart: always
    env_file: .env
    depends_on:
      migrations:
        condition: service_completed_successfully

  gateway-service:
    build: ./gateway
    container_name: vdesk_gateway
    restart: always
    env_file: .env
    # ports больше не нужны, Nginx прокинет запросы сам
    depends_on:
      chat-service:
        condition: service_started
      auth-service:
        condition: service_started

networks:
  default:
    name: vdesk_network